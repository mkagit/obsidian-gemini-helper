name: Sync Upstream

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write

    steps:
      - name: Resolve parent repository
        id: parent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          parent="$(gh api repos/${{ github.repository }} --jq '.parent.full_name // empty')"
          branch="$(gh api repos/${{ github.repository }} --jq '.parent.default_branch // empty')"

          if [ -z "$parent" ] || [ -z "$branch" ]; then
            echo "is_fork=false" >> "$GITHUB_OUTPUT"
            echo "Repository is not a fork. Skipping upstream sync."
            exit 0
          fi

          echo "is_fork=true" >> "$GITHUB_OUTPUT"
          echo "parent=$parent" >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "Syncing from $parent ($branch)"

          compare_json="$(gh api repos/$parent/compare/$branch...${{ github.repository_owner }}:$branch)"
          behind_by="$(echo "$compare_json" | jq -r '.behind_by')"
          ahead_by="$(echo "$compare_json" | jq -r '.ahead_by')"
          status="$(echo "$compare_json" | jq -r '.status')"

          echo "Compare status: $status (ahead=$ahead_by, behind=$behind_by)"

          if [ "$behind_by" -eq 0 ]; then
            echo "needs_sync=false" >> "$GITHUB_OUTPUT"
            echo "Fork is not behind upstream. No sync needed."
          else
            echo "needs_sync=true" >> "$GITHUB_OUTPUT"
            echo "Fork is behind upstream. Sync required."
          fi

      - name: Checkout fork branch
        if: steps.parent.outputs.is_fork == 'true' && steps.parent.outputs.needs_sync == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.parent.outputs.branch }}
          fetch-depth: 0

      - name: Merge upstream into fork
        if: steps.parent.outputs.is_fork == 'true' && steps.parent.outputs.needs_sync == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote add upstream https://github.com/${{ steps.parent.outputs.parent }}.git
          git fetch upstream ${{ steps.parent.outputs.branch }}

          git checkout ${{ steps.parent.outputs.branch }}
          git merge --no-edit -X theirs upstream/${{ steps.parent.outputs.branch }}
          git push origin ${{ steps.parent.outputs.branch }}

      - name: Trigger release workflow
        if: steps.parent.outputs.is_fork == 'true' && steps.parent.outputs.needs_sync == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run release.yml --repo ${{ github.repository }} --ref ${{ steps.parent.outputs.branch }}
